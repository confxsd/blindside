name: Daily Blog Generator

on:
  schedule:
    # Runs at 08:00 UTC every day (11:00 AM Istanbul time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog.js

      - name: Commit and push
        run: |
          git config user.name "blindside-blog-bot"
          git config user.email "bot@blindside.to"
          git add -A
          SLUG=$(git diff --cached --name-only | grep 'blog/' | head -1 | cut -d'/' -f2)
          git commit -m "blog: ${SLUG}" || echo "No changes to commit"
          git push
