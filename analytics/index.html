<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | blindside.</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #a855f7;
      --accent-dim: rgba(168, 85, 247, 0.15);
      --accent2: #ec4899;
      --red: #ff4444;
      --blue: #4488ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h1 a {
      color: var(--text);
      text-decoration: none;
    }

    h1 span { color: var(--accent); }

    .controls {
      display: flex;
      gap: 6px;
    }

    .controls button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .controls button:hover { border-color: var(--accent); color: var(--text); }
    .controls button.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .site-filter {
      display: flex;
      gap: 6px;
    }

    .site-filter button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .site-filter button:hover { border-color: var(--accent); color: var(--text); }
    .site-filter button.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* Stat cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .stat-value.live::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent2);
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Chart */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
    }

    .chart-toggle {
      display: flex;
      gap: 4px;
    }

    .chart-toggle button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .chart-toggle button.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    canvas {
      width: 100% !important;
      height: 200px !important;
    }

    /* Tables */
    .tables {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .table-card h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .row:last-child { border-bottom: none; }

    .row-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 12px;
    }

    .row-value {
      font-variant-numeric: tabular-nums;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .row-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      margin-top: 4px;
      opacity: 0.5;
      transition: width 0.3s;
    }

    .loading {
      text-align: center;
      color: var(--text-dim);
      padding: 80px 0;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { color: var(--text-dim); font-style: italic; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="../">blindside.</a> <span>/</span> analytics</h1>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <div class="controls">
          <button data-days="7">7d</button>
          <button data-days="30" class="active">30d</button>
          <button data-days="90">90d</button>
          <button data-days="365">1y</button>
        </div>
      </div>
    </header>

    <div id="app">
      <div class="loading">Loading analytics</div>
    </div>
  </div>

  <script>
    const API = 'https://api.rome.markets/api/analytics';
    let currentDays = 30;
    let chartMode = 'visitors';

    async function load(days) {
      currentDays = days;
      const app = document.getElementById('app');

      try {
        let url = `${API}?days=${days}&hostname=blindside.to`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        render(data);
      } catch (e) {
        app.innerHTML = '<div class="empty">Could not load analytics data.</div>';
      }
    }

    function render(data) {
      const app = document.getElementById('app');

      const viewsPerVisitor = data.totals.visitors > 0
        ? (data.totals.views / data.totals.visitors).toFixed(1)
        : '0';

      app.innerHTML = `
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Unique Visitors</div>
            <div class="stat-value">${fmt(data.totals.visitors)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total Views</div>
            <div class="stat-value">${fmt(data.totals.views)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Views / Visitor</div>
            <div class="stat-value">${viewsPerVisitor}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Live Now</div>
            <div class="stat-value live">${data.totals.live}</div>
          </div>
        </div>

        <div class="chart-section">
          <div class="chart-header">
            <div class="chart-title">Traffic</div>
            <div class="chart-toggle">
              <button class="${chartMode === 'visitors' ? 'active' : ''}" data-mode="visitors">Visitors</button>
              <button class="${chartMode === 'views' ? 'active' : ''}" data-mode="views">Views</button>
            </div>
          </div>
          <canvas id="chart"></canvas>
        </div>

        <div class="tables">
          <div class="table-card">
            <h3>Top Pages</h3>
            ${tableRows(data.pages, 'path', 'visitors')}
          </div>
          <div class="table-card">
            <h3>Referrers</h3>
            ${tableRows(data.referrers, 'referrer', 'visitors')}
          </div>
          <div class="table-card">
            <h3>Countries</h3>
            ${tableRows(data.countries, 'country', 'visitors')}
          </div>
          <div class="table-card">
            <h3>Devices</h3>
            ${tableRows(data.devices, 'device', 'visitors')}
          </div>
        </div>
      `;

      drawChart(data.daily);
      bindChartToggle(data);
    }

    function tableRows(items, labelKey, valueKey) {
      if (!items || items.length === 0) return '<div class="empty">No data yet</div>';
      const max = Math.max(...items.map(i => i[valueKey]));
      return items.map(item => {
        const pct = max > 0 ? (item[valueKey] / max * 100) : 0;
        const label = item[labelKey] || '(direct)';
        return `
          <div class="row">
            <div>
              <div class="row-label" title="${esc(label)}">${esc(label)}</div>
              <div class="row-bar" style="width: ${pct}%"></div>
            </div>
            <div class="row-value">${fmt(item[valueKey])}</div>
          </div>
        `;
      }).join('');
    }

    function drawChart(daily) {
      const canvas = document.getElementById('chart');
      if (!canvas || !daily || daily.length === 0) return;
      const ctx = canvas.getContext('2d');

      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const w = rect.width;
      const h = rect.height;
      const pad = { top: 10, right: 10, bottom: 24, left: 40 };
      const cw = w - pad.left - pad.right;
      const ch = h - pad.top - pad.bottom;

      const key = chartMode === 'visitors' ? 'visitors' : 'views';
      const values = daily.map(d => d[key]);
      const max = Math.max(...values, 1);

      ctx.clearRect(0, 0, w, h);

      // Grid lines
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + (ch / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(w - pad.right, y);
        ctx.stroke();

        ctx.fillStyle = '#555';
        ctx.font = '11px DM Sans, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(fmt(Math.round(max - (max / 4) * i)), pad.left - 6, y + 4);
      }

      if (daily.length < 2) return;

      const barWidth = Math.max(2, (cw / daily.length) - 2);

      // Bars with gradient effect
      daily.forEach((d, i) => {
        const x = pad.left + (cw / daily.length) * i + 1;
        const barH = (d[key] / max) * ch;
        const y = pad.top + ch - barH;

        if (d[key] > 0) {
          const grad = ctx.createLinearGradient(x, y, x, y + barH);
          grad.addColorStop(0, '#a855f7');
          grad.addColorStop(1, '#ec4899');
          ctx.fillStyle = grad;
        } else {
          ctx.fillStyle = '#222';
        }
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.roundRect(x, y, barWidth, barH, [2, 2, 0, 0]);
        ctx.fill();
        ctx.globalAlpha = 1;
      });

      // X labels
      ctx.fillStyle = '#555';
      ctx.font = '11px DM Sans, sans-serif';
      ctx.textAlign = 'center';
      const step = Math.max(1, Math.floor(daily.length / 5));
      for (let i = 0; i < daily.length; i += step) {
        const x = pad.left + (cw / daily.length) * i + barWidth / 2;
        const label = daily[i].date.slice(5);
        ctx.fillText(label, x, h - 4);
      }
    }

    function bindChartToggle(data) {
      document.querySelectorAll('.chart-toggle button').forEach(btn => {
        btn.addEventListener('click', () => {
          chartMode = btn.dataset.mode;
          render(data);
        });
      });
    }

    function fmt(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return String(n);
    }

    function esc(s) {
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }

    // Period buttons
    document.querySelectorAll('.controls button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        load(parseInt(btn.dataset.days));
      });
    });

    // Auto-refresh every 60s
    setInterval(() => load(currentDays), 60000);

    load(30);
  </script>
  <script src="../t.js"></script>
</body>
</html>
